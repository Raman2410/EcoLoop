name: Node.js CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      # Backup existing .env file
      - name: Backup .env
        run: |
          if [ -f .env ]; then
            mv .env /tmp/env_backup
          fi

      # Checkout latest code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Restore .env after checkout
      - name: Restore .env
        run: |
          if [ -f /tmp/env_backup ]; then
            mv /tmp/env_backup .env
          fi

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build project (optional)
      - name: Build project
        run: npm run build --if-present

      # Restart server using PM2
      - name: Restart server with PM2
        run: |
          pm2 delete server || true
          pm2 start src/server.js --name server
          pm2 save
